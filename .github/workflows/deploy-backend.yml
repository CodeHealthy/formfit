name: Deploy Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: ${{ secrets.PORT || 5000 }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID_PRO: ${{ secrets.STRIPE_PRICE_ID_PRO }}
      FRONTEND_BILLING_SUCCESS_URL: ${{ secrets.FRONTEND_BILLING_SUCCESS_URL }}
      FRONTEND_BILLING_CANCEL_URL: ${{ secrets.FRONTEND_BILLING_CANCEL_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      BCRYPT_SALT_ROUNDS: ${{ secrets.BCRYPT_SALT_ROUNDS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p ../deploy-package
          cp -r dist package.json package-lock.json ecosystem.config.cjs ../deploy-package/

      - name: Upload backend package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          source: deploy-package/*
          target: ${{ secrets.EC2_BACKEND_DIR }}
          strip_components: 1

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          NODE_ENV: production
          PORT: ${{ secrets.PORT || 5000 }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID_PRO: ${{ secrets.STRIPE_PRICE_ID_PRO }}
          FRONTEND_BILLING_SUCCESS_URL: ${{ secrets.FRONTEND_BILLING_SUCCESS_URL }}
          FRONTEND_BILLING_CANCEL_URL: ${{ secrets.FRONTEND_BILLING_CANCEL_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          BCRYPT_SALT_ROUNDS: ${{ secrets.BCRYPT_SALT_ROUNDS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          envs: NODE_ENV,PORT,FRONTEND_URL,MONGODB_URI,MONGODB_DB_NAME,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_ID_PRO,FRONTEND_BILLING_SUCCESS_URL,FRONTEND_BILLING_CANCEL_URL,JWT_SECRET,JWT_EXPIRES_IN,BCRYPT_SALT_ROUNDS
          script: |
            set -e
            cd "${{ secrets.EC2_BACKEND_DIR }}"
            cat > .env <<EOF
            NODE_ENV=$NODE_ENV
            PORT=$PORT
            FRONTEND_URL=$FRONTEND_URL
            MONGODB_URI=$MONGODB_URI
            MONGODB_DB_NAME=$MONGODB_DB_NAME
            STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            STRIPE_PRICE_ID_PRO=$STRIPE_PRICE_ID_PRO
            FRONTEND_BILLING_SUCCESS_URL=$FRONTEND_BILLING_SUCCESS_URL
            FRONTEND_BILLING_CANCEL_URL=$FRONTEND_BILLING_CANCEL_URL
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=$JWT_EXPIRES_IN
            BCRYPT_SALT_ROUNDS=$BCRYPT_SALT_ROUNDS
            EOF
            if ! command -v npm >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            npm ci --omit=dev
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi
            pm2 startOrReload ecosystem.config.cjs --env production
            pm2 save
